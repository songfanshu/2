<style>
    /* 确保页面切换时不会出现横向滚动条 */
    html, body {
        overflow-x: hidden;
    }

    /* Swup 过渡容器 */
    .transition-main {
        position: relative;
        width: 100%;
    }

    /* 页面离开动画：向左滑出并淡出 */
    .swup-transition-main.is-leaving {
        transform: translateX(-30px);
        opacity: 0;
        transition: transform 0.35s ease-out, opacity 0.3s ease-out;
    }

    /* 页面进入动画：从右侧滑入（初始状态） */
    html.is-changing .swup-transition-main {
        transform: translateX(30px);
        opacity: 0;
    }

    /* 进入动画进行中（由 Swup 自动添加 .is-animating） */
    html.is-changing .swup-transition-main.is-animating {
        transform: translateX(0);
        opacity: 1;
        transition: transform 0.35s ease-out, opacity 0.3s ease-out;
    }

    /* 防止页面切换时滚动条宽度变化导致页面抖动 */
    html.is-changing {
        overflow-y: scroll;
    }
</style>
