<!-- 引入 Swup 核心库 -->
<script src="https://unpkg.com/swup@4"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // 等待主题本身完成初次渲染（避免冲突）
        setTimeout(() => {
            // 确定主内容容器 – Wowchemy 主题通常使用 id="main"
            // 你可以打开浏览器开发者工具检查实际包裹页面内容的元素 ID
            const mainContainer = document.querySelector('#main');
            if (!mainContainer) {
                console.warn('未找到 #main 容器，Swup 可能无法正常工作');
                return;
            }

            const swup = new Swup({
                containers: ['#main'],          // 只切换 #main 内的内容
                linkSelector: 'a[href^="/"]:not([data-no-swup]), a[href^="' + window.location.origin + '"]:not([data-no-swup])',
                cache: true,
                animateHistoryBrowsing: true,
            });

            // 页面切换完成后，重新初始化主题的所有动态组件
            swup.on('contentReplaced', () => {
                // 重新运行 Wowchemy 的全局初始化函数（如果存在）
                if (typeof window.hugoBlox !== 'undefined' && window.hugoBlox.initAll) {
                    window.hugoBlox.initAll();
                }
                // 重新触发图片懒加载（如果主题使用了 lazysizes）
                if (typeof lazySizes !== 'undefined') {
                    lazySizes.init();
                }
                // 重新绑定搜索框等交互
                if (typeof window.initSearch !== 'undefined') {
                    window.initSearch();
                }
                // 发送一个自定义事件，方便其他脚本监听
                document.dispatchEvent(new Event('swup:contentReplaced'));
            });
        }, 100);
    });
</script>
