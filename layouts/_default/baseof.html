<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} | {{ .Site.Title }}</title>
    {{ partial "site_head" . }}
    
    <!-- Swup CSS (仅用于过渡动画，非必需但推荐) -->
    <style>
        /* 过渡容器 */
        .transition-main {
            position: relative;
            overflow-x: hidden;
        }
        /* 页面进入/离开动画 */
        .swup-transition-main {
            transition: transform 0.4s ease-out, opacity 0.3s ease;
        }
        /* 离开时向左滑出并透明 */
        .swup-transition-main.is-leaving {
            transform: translateX(-100%);
            opacity: 0;
        }
        /* 进入时从右侧滑入 */
        html.is-changing .swup-transition-main {
            transform: translateX(100%);
            opacity: 0;
        }
        html.is-changing .swup-transition-main.is-animating {
            transform: translateX(0);
            opacity: 1;
        }
        /* 防止页面切换时滚动条跳动 */
        html.is-changing {
            overflow-y: scroll;
        }
    </style>
</head>
<body>
    <!-- 页面主容器，id 供 Swup 识别 -->
    <main id="swup" class="transition-main">
        {{ block "main" . }}{{ end }}
    </main>

    <!-- 引入 Swup 和 自定义初始化脚本 -->
    <script src="https://unpkg.com/swup@4"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化 Swup
            const swup = new Swup({
                containers: ['#swup'],          // 要过渡的容器
                linkSelector: 'a[href^="/"]:not([data-no-swup]), a[href^="' + window.location.origin + '"]:not([data-no-swup])',
                plugins: [],                    // 可按需添加 Swup 插件
                animationSelector: '[class*="transition-"]',
                cache: true,
                animateHistoryBrowsing: true,
            });

            // 切换完成后重新初始化 Wowchemy 的懒加载、搜索等组件
            swup.on('contentReplaced', () => {
                if (typeof window.hugoBlox !== 'undefined' && window.hugoBlox.initAll) {
                    window.hugoBlox.initAll();
                }
                // 重新绑定图片懒加载 (如果主题使用了 lazysizes)
                if (typeof lazySizes !== 'undefined') {
                    lazySizes.init();
                }
                // 触发一个自定义事件，方便其他脚本监听
                document.dispatchEvent(new Event('swup:contentReplaced'));
            });
        });
    </script>

    <!-- 主题原有的底部脚本（如有） -->
    {{ partial "site_js" . }}
</body>
</html>
