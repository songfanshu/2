<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{{ .Title }}</title>
    <style>
        /* 横向滑动动画 */
        .transition-main {
            position: relative;
            width: 100%;
        }
        .swup-transition-main.is-leaving {
            transform: translateX(-30px);
            opacity: 0;
            transition: transform 0.3s ease, opacity 0.2s ease;
        }
        html.is-changing .swup-transition-main {
            transform: translateX(30px);
            opacity: 0;
        }
        html.is-changing .swup-transition-main.is-animating {
            transform: translateX(0);
            opacity: 1;
            transition: transform 0.3s ease, opacity 0.2s ease;
        }
        html.is-changing {
            overflow-y: scroll;
        }
        /* 临时导航样式 */
        nav a { margin-right: 1rem; }
    </style>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="/post/">News</a>
        <a href="/people/">People</a>
        <a href="/publication/">Publications</a>
    </nav>

    <main id="swup" class="transition-main">
        {{ block "main" . }}{{ end }}
    </main>

    <script src="https://unpkg.com/swup@4"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            new Swup({
                containers: ['#swup'],
                linkSelector: 'a[href^="/"]',
                cache: true,
            });
        });
    </script>
</body>
</html>
