# SITE SETUP
# Guide: https://docs.hugoblox.com/tutorial/
# Documentation: https://docs.hugoblox.com/
# This file is formatted using YAML syntax - learn more at https://learnxinyminutes.com/docs/yaml/

# Appearance

appearance:
  theme_day: blue     # 日间主题改为 blue
  theme_night: ocean  # 夜间主题改为 ocean
  font: native        # 字体使用系统默认
  font_size: L        # 字体大小：L(大)/M(中)/S(小)

# SEO

marketing:
  seo:
    site_type: Organization    # 网站类型：组织/个人/企业等
    local_business_type: ''    # 本地业务类型（如留空）
    org_name: ''               # 组织名称
    description: 'A highly-customizable Hugo research group theme...'  # 网站描述
    twitter: 'GetResearchDev'  # Twitter账号
  analytics:
    google_analytics: ''       # Google Analytics追踪ID
    baidu_tongji: ''           # 百度统计ID
    google_tag_manager: ''     # Google Tag Manager ID
    microsoft_clarity: ''      # Microsoft Clarity ID
  verification:
    google: ''                 # Google站点验证码
    baidu: ''                  # 百度站点验证码

# Site header

header:
  navbar:
    enable: true              # 启用导航栏
    align: r                  # 导航栏对齐方式：r(右)/l(左)/c(中)
    show_logo: true           # 显示网站Logo
    show_language: false      # 不显示语言切换
    show_day_night: true      # 显示日/夜间模式切换按钮
    show_search: true         # 显示搜索框
    highlight_active_link: false  # 不高亮当前页面链接

# Site footer

footer:
  copyright:
    notice: '© {year} Me. This work is licensed under {license}'
    license:
      enable: true
      allow_derivatives: false    # 不允许衍生作品
      share_alike: true           # 相同方式共享
      allow_commercial: false     # 不允许商业使用

# Localization

locale:
  date_format: '2006年1月2日'    # 中国日期格式
  time_format: '15:04'           # 24小时制时间格式
  address_format: zh-cn          # 中国地址格式

# Site features

features:
  syntax_highlighter:
    enable: false               # 禁用代码语法高亮
    extra_languages:
      - r
      - latex
  math:
    enable: false               # 禁用数学公式（LaTeX）
  privacy_pack:
    enable: false               # 禁用隐私包（GDPR相关）
  repository:
    url: 'https://github.com/<username>/<repository>'  # Git仓库地址
    content_dir: content        # 内容目录
    branch: main                # 主分支
  avatar:
    gravatar: false             # 不使用Gravatar头像
    shape: circle               # 头像形状：圆形
  comment:
    provider: ''                # 评论系统提供商（disqus/commento/giscus等）
    disqus:
      shortname: ''
      show_count: true
    # ... 其他评论系统配置
  search:
    provider: wowchemy          # 搜索提供商：内置搜索
    algolia:
      app_id: ''                # Algolia搜索配置（如使用）
      api_key: ''
      index_name: ''
      show_logo: false
  map:
    provider: 'mapnik'          # 地图提供商
    api_key: ''                 # 地图API密钥
    zoom: 15                    # 默认缩放级别

# Extensions

extensions:
  decap_cms:
    branch: main                # Decap CMS的分支
    local_backend: false        # 是否使用本地后端
  academicons:
    enable: true                # 启用学术图标（Google Scholar等）

# Citation style

publications:
  date_format: January 2006     # 出版物日期格式
  citation_style: apa           # 引用样式：APA格式
